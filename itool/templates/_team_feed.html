{% set chat_pos = app_cfg.get('chat_position','left') %}
<aside id="team-feed" class="shrink-0 {% if chat_pos == 'right' %}border-l{% else %}border-r{% endif %} border-gray-300/50 flex flex-col bg-white/10">
  <div id="feed-resize-handle" data-side="{{ chat_pos }}" class="{% if chat_pos == 'right' %}side-left{% else %}side-right{% endif %}" title="Breite anpassen"></div>
  <div class="px-4 py-3 border-b border-gray-300/40 flex items-center gap-2">
    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"/>
    </svg>
    <span class="text-xs font-semibold text-gray-500 uppercase tracking-wide flex-1">Team-Feed</span>
    <button type="button" onclick="closeFeed()" title="Team-Feed schließen" class="text-gray-400 hover:text-gray-700 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Messages -->
  <div id="feed-items" class="flex-1 overflow-y-auto p-3 space-y-2">
    <div class="text-center text-gray-300 text-xs py-8">Laden…</div>
  </div>

  <!-- Input -->
  <div class="p-3 border-t border-gray-300/40 bg-white/5">
    <form method="POST" action="{{ url_for('feed_send') }}" enctype="multipart/form-data" id="feed-form" onsubmit="return ajaxFeedSubmit(event)">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <!-- @mention autocomplete -->
      <div id="mention-dropdown" class="hidden mb-1 bg-white border border-gray-200 rounded-xl shadow-lg overflow-hidden max-h-40 overflow-y-auto"></div>
      <div class="flex gap-2 mb-2">
        <input name="body" id="feed-input" placeholder="Nachricht schreiben… (@Name erwähnen)" autocomplete="off"
               class="flex-1 bg-white/80 border border-gray-300/60 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder-gray-400">
        <button type="submit" class="bg-[#1c3461] text-white px-3 py-2 rounded-xl hover:bg-[#2a4a8a] transition-colors shrink-0">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
        </button>
      </div>
      <label class="flex items-center gap-1.5 cursor-pointer text-xs text-gray-400 hover:text-gray-600">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
        <span id="file-label">Anhang hinzufügen</span>
        <input type="file" name="file" class="hidden" onchange="document.getElementById('file-label').textContent = this.files[0]?.name || 'Anhang hinzufügen'">
      </label>
    </form>
  </div>
</aside>
