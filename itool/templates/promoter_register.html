<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promoter Registrierung</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#1c3461] to-[#2a4a8a] flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl bg-[#1c3461] flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Promoter-Konto erstellen</h1>
      <p class="text-gray-400 text-sm mt-1">Du wurdest eingeladen – registriere dich jetzt.</p>
    </div>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm mb-5">{{ error }}</div>
    {% endif %}

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="bg-green-50 border border-green-200 text-green-700 rounded-xl px-4 py-3 text-sm mb-5">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" class="space-y-4">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Benutzername (für Login)</label>
        <input name="username" type="text" required autocomplete="off"
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#1c3461]">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Anzeigename (sichtbar für Admin)</label>
        <input name="display_name" type="text"
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#1c3461]">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Passwort</label>
        <input name="password" type="password" required
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#1c3461]">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1">Passwort wiederholen</label>
        <input name="password2" type="password" required
               class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#1c3461]">
      </div>
      <button type="submit"
              class="w-full bg-[#1c3461] text-white py-3 rounded-xl font-semibold text-sm hover:bg-[#2a4a8a] transition-colors mt-2">
        Konto erstellen & anmelden
      </button>
    </form>
    <p class="text-center text-xs text-gray-400 mt-6">
      Bereits registriert? <a href="{{ url_for('login') }}" class="text-[#1c3461] hover:underline">Anmelden</a>
    </p>
  </div>
</body>
</html>
