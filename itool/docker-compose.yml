services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-itool}
      POSTGRES_USER: ${DB_USER:-itool}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-itool} -d ${DB_NAME:-itool}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  itool:
    build: .
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      DB_HOST: db
      TZ: Europe/Berlin
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-itool}
      DB_USER: ${DB_USER:-itool}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  dbdata:
